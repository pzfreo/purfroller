[pipeline]
stages = ["load", "arrange", "plate", "slice", "pack"]

[plate]
size = [256, 256]

[slicer]
engine = "orca"
version = "2.3.1"
bed_type = "Textured PEI Plate"

[slicer.orca]
printer  = "Bambu Lab P1S 0.4 nozzle"
process  = "0.20mm Strength @BBL X1C"
filaments = ["Generic PETG @base"]

[slicer.orca.overrides]
wall_loops              = "5"
sparse_infill_density   = "40%"
sparse_infill_pattern   = "gyroid"
top_shell_layers        = "6"
bottom_shell_layers     = "6"

[pack]
command = "bambox repack {sliced_3mf}"
output  = "{sliced_3mf}"
docker  = true

# ── Outer frame ───────────────────────────────────────────────────────────────
# Side plates: lie flat on large face (Y→Z), flange rises upward, all holes vertical
[[parts]]
file   = "parts/sp_r.step"
rotate = [90.0, 0.0, 0.0]

[[parts]]
file   = "parts/sp_l.step"
rotate = [-90.0, 0.0, 0.0]

# Crossbars: stand on end (Y→Z) — through-holes run bottom-to-top, no supports needed
[[parts]]
file   = "parts/xbar_top.step"
rotate = [90.0, 0.0, 0.0]

[[parts]]
file   = "parts/xbar_bot.step"
rotate = [90.0, 0.0, 0.0]

# ── U-frame ───────────────────────────────────────────────────────────────────
# Base on bed, arms pointing up — same orientation as assembly
[[parts]]
file   = "parts/u_frame.step"
orient = "upright"

# ── Rollers ───────────────────────────────────────────────────────────────────
# Cylinders stand upright (Y-axis → Z)
[[parts]]
file   = "parts/upper_roller.step"
rotate = [90.0, 0.0, 0.0]

[[parts]]
file   = "parts/roller.step"
rotate = [90.0, 0.0, 0.0]

# ── Thrust washers ────────────────────────────────────────────────────────────
# Thin discs lie flat (Y-axis → Z, disc face horizontal)
[[parts]]
file   = "parts/washer_r.step"
rotate = [90.0, 0.0, 0.0]

[[parts]]
file   = "parts/washer_l.step"
rotate = [90.0, 0.0, 0.0]

[[parts]]
file   = "parts/upper_washer_r.step"
rotate = [90.0, 0.0, 0.0]

[[parts]]
file   = "parts/upper_washer_l.step"
rotate = [90.0, 0.0, 0.0]

# ── Crank assembly ────────────────────────────────────────────────────────────
# Crank arm is flat in XY plane — upright keeps it lying flat on bed
[[parts]]
file   = "parts/crank.step"
orient = "upright"

# Handle cylinder stands upright (Y-axis → Z)
[[parts]]
file   = "parts/handle.step"
rotate = [90.0, 0.0, 0.0]

# Retaining washer lies flat (Y-axis → Z)
[[parts]]
file   = "parts/ret_washer.step"
rotate = [90.0, 0.0, 0.0]
