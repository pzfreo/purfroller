name: Slice

on:
  push:
    branches: [main]
  pull_request:

jobs:
  slice:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Export parts
        run: |
          pip install build123d
          python export_parts.py
      - uses: estampo/estampo/action@v0
        with:
          config: estampo.toml
